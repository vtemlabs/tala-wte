name: Lint

# Runs the same gate as `make lint`: golangci-lint on the Go backend and
# ESLint + Prettier + svelte-check on the web console. Kept separate from the
# release workflow so every push and PR is checked, not just tags.
on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  lint-go:
    name: Go (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Provide go:embed placeholder
        # cmd/server embeds web/build; without it the package fails to load and
        # the linter cannot analyze it. A stub is enough for static analysis.
        run: |
          mkdir -p web/build
          echo '<!doctype html>' > web/build/index.html

      - name: golangci-lint
        # v7+ supports golangci-lint v2; v9 runs on Node 24.
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  lint-web:
    name: Web (eslint + prettier + svelte-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up pnpm
        # Match the local pnpm: 10+ reads settings (esbuild build approval) from
        # pnpm-workspace.yaml; pnpm 9 rejects that file for lacking a packages key.
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint + Prettier
        run: pnpm lint

      - name: svelte-check
        run: pnpm check
