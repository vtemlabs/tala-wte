name: agent-docs
on:
  push:
    branches: ['**']
permissions:
  contents: write
jobs:
  codemap:
    if: ${{ !contains(github.event.head_commit.message, '[skip-docs]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate codemap
        run: bash scripts/agent/gen-codemap.sh .
      - name: Commit refreshed docs
        run: |
          if ! git diff --quiet -- docs/agent/codemap.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/agent/codemap.md
            git commit -m "docs(agent): refresh codemap [skip-docs]"
            git push
          else
            echo "codemap already current"
          fi
