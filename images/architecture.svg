<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, sans-serif">
  <defs>
    <radialGradient id="bgGlow" cx="26%" cy="48%" r="42%">
      <stop offset="0%" stop-color="#2f81f7" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#1f6feb" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#08090c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2f81f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#58a0ff" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a0ff"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="wolfGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0 H0 V46" fill="none" stroke="#20242e" stroke-width="1" stroke-opacity="0.35"/>
    </pattern>
    <marker id="ar" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#58a0ff" stroke-width="1.6"/>
    </marker>
    <marker id="arR" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0 1 L9 5 L0 9" fill="none" stroke="#fb7185" stroke-width="1.6"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#08090c"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#bgGlow)"/>

  <!-- title -->
  <text x="64" y="74" font-size="38" font-weight="800" letter-spacing="-1" fill="#e8ebf2">TALA WTE</text>
  <text x="66" y="101" font-size="12.5" letter-spacing="4.5" fill="#6b7384" font-family="'JetBrains Mono', monospace">WIRELESS  TRAINING  ENVIRONMENT</text>

  <!-- ============ connectors (behind cards) ============ -->
  <!-- AP -> networks -->
  <path d="M520 360 C 580 250, 600 212, 624 212" fill="none" stroke="url(#line)" stroke-width="1.8"/>
  <path d="M536 412 C 590 360, 600 360, 624 360" fill="none" stroke="url(#line)" stroke-width="1.8"/>
  <path d="M520 464 C 580 510, 600 508, 624 508" fill="none" stroke="url(#line)" stroke-width="1.8"/>
  <!-- networks -> den -->
  <path d="M1006 212 L 1118 212" fill="none" stroke="url(#line)" stroke-width="1.8" marker-end="url(#ar)"/>
  <path d="M1006 360 L 1118 360" fill="none" stroke="url(#line)" stroke-width="1.8" marker-end="url(#ar)"/>
  <path d="M1006 508 L 1118 508" fill="none" stroke="url(#line)" stroke-width="1.8" marker-end="url(#ar)"/>
  <!-- AP -> auth -->
  <path d="M348 556 C 320 640, 300 670, 300 716" fill="none" stroke="#2f81f7" stroke-width="1.8" stroke-opacity="0.65"/>
  <!-- attacker capture beam (taps the air, points at the den) -->
  <path d="M716 168 C 820 230, 980 250, 1108 232" fill="none" stroke="#fb7185" stroke-width="1.8" stroke-dasharray="8 7" opacity="0.85" marker-end="url(#arR)"/>

  <!-- wireless arcs from AP -->
  <g fill="none" stroke="url(#arc)" stroke-linecap="round">
    <path d="M515 318 A 178 178 0 0 1 515 486" stroke-width="2.4" opacity="0.5"/>
    <path d="M548 286 A 224 224 0 0 1 548 518" stroke-width="1.9" opacity="0.3"/>
    <path d="M582 252 A 272 272 0 0 1 582 552" stroke-width="1.5" opacity="0.18"/>
  </g>

  <!-- ============ wolf: access point / den leader ============ -->
  <circle cx="372" cy="402" r="196" fill="#2f81f7" opacity="0.12" filter="url(#soft)"/>
  <image href="tala-wolf-radar.png" x="222" y="252" width="300" height="300" opacity="0.97" filter="url(#wolfGlow)"/>
  <text x="372" y="600" font-size="14" font-weight="700" letter-spacing="1.4" fill="#93c5fd" text-anchor="middle" font-family="'JetBrains Mono', monospace">ACCESS POINT &#183; DEN LEADER</text>
  <text x="372" y="621" font-size="11" fill="#6b7384" text-anchor="middle" font-family="'JetBrains Mono', monospace">hostapd &#183; WEP &#8594; WPA3-Enterprise</text>

  <!-- ============ networks (app-style rows) ============ -->
  <text x="624" y="150" font-size="12.5" font-weight="700" letter-spacing="2" fill="#6b7384" font-family="'JetBrains Mono', monospace">NETWORKS</text>
  <g font-family="'JetBrains Mono', monospace">
    <!-- enterprise -->
    <g transform="translate(624 212)">
      <rect x="0" y="-38" width="382" height="76" rx="11" fill="#101218" stroke="#20242e" stroke-width="1.2"/>
      <circle cx="26" cy="0" r="4.5" fill="#22c55e"/>
      <text x="46" y="-6" font-size="17" font-weight="600" fill="#e8ebf2" font-family="'Inter', sans-serif">Acme-Corp</text>
      <rect x="46" y="8" width="152" height="20" rx="5" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.7" stroke-width="1"/>
      <text x="58" y="22" font-size="10.5" fill="#c4b5fd">WPA2-ENTERPRISE</text>
    </g>
    <!-- open + captive portal -->
    <g transform="translate(624 360)">
      <rect x="0" y="-38" width="382" height="76" rx="11" fill="#101218" stroke="#20242e" stroke-width="1.2"/>
      <circle cx="26" cy="0" r="4.5" fill="#22c55e"/>
      <text x="46" y="-6" font-size="17" font-weight="600" fill="#e8ebf2" font-family="'Inter', sans-serif">Acme-Guest</text>
      <rect x="46" y="8" width="54" height="20" rx="5" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.7" stroke-width="1"/>
      <text x="73" y="22" font-size="10.5" fill="#fbbf6b" text-anchor="middle">OPEN</text>
      <rect x="108" y="8" width="124" height="20" rx="5" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.7" stroke-width="1"/>
      <text x="170" y="22" font-size="10.5" fill="#fbbf6b" text-anchor="middle">CAPTIVE PORTAL</text>
    </g>
    <!-- hidden + isolated -->
    <g transform="translate(624 508)">
      <rect x="0" y="-38" width="382" height="76" rx="11" fill="#0c0e13" stroke="#20242e" stroke-width="1.2" stroke-dasharray="5 4"/>
      <circle cx="26" cy="0" r="4.5" fill="#6b7384"/>
      <text x="46" y="-6" font-size="17" font-weight="600" fill="#9aa3b4" font-family="'Inter', sans-serif">Conference-5G</text>
      <rect x="46" y="8" width="54" height="20" rx="5" fill="#22d3ee" fill-opacity="0.13" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1"/>
      <text x="73" y="22" font-size="10.5" fill="#7fe3f4" text-anchor="middle">WPA3</text>
      <rect x="108" y="8" width="72" height="20" rx="5" fill="#22d3ee" fill-opacity="0.13" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1"/>
      <text x="144" y="22" font-size="10.5" fill="#7fe3f4" text-anchor="middle">HIDDEN</text>
      <rect x="188" y="8" width="78" height="20" rx="5" fill="#22d3ee" fill-opacity="0.13" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1"/>
      <text x="227" y="22" font-size="10.5" fill="#7fe3f4" text-anchor="middle">ISOLATED</text>
    </g>
  </g>

  <!-- ============ the den (clients + activity) ============ -->
  <text x="1118" y="150" font-size="12.5" font-weight="700" letter-spacing="2" fill="#6b7384" font-family="'JetBrains Mono', monospace">THE DEN &#183; CLIENT PACK</text>
  <g font-family="'JetBrains Mono', monospace">
    <g transform="translate(1118 212)">
      <rect x="0" y="-38" width="382" height="76" rx="11" fill="#101218" stroke="#20242e" stroke-width="1.2"/>
      <rect x="22" y="-16" width="42" height="32" rx="5" fill="none" stroke="#f97316" stroke-width="2"/><line x1="34" y1="22" x2="52" y2="22" stroke="#f97316" stroke-width="2"/><circle cx="43" cy="0" r="3" fill="#f97316"/>
      <text x="84" y="-4" font-size="14" fill="#e8ebf2" font-family="'Inter', sans-serif">Client</text>
      <rect x="84" y="8" width="128" height="20" rx="5" fill="#22d3ee" fill-opacity="0.13" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1"/>
      <text x="148" y="22" font-size="10.5" fill="#7fe3f4" text-anchor="middle">802.1X AUTH</text>
    </g>
    <g transform="translate(1118 360)">
      <rect x="0" y="-38" width="382" height="76" rx="11" fill="#101218" stroke="#20242e" stroke-width="1.2"/>
      <rect x="22" y="-16" width="42" height="32" rx="5" fill="none" stroke="#f97316" stroke-width="2"/><line x1="34" y1="22" x2="52" y2="22" stroke="#f97316" stroke-width="2"/><circle cx="43" cy="0" r="3" fill="#f97316"/>
      <text x="84" y="-4" font-size="14" fill="#e8ebf2" font-family="'Inter', sans-serif">Client</text>
      <rect x="84" y="8" width="132" height="20" rx="5" fill="#f97316" fill-opacity="0.15" stroke="#f97316" stroke-opacity="0.7" stroke-width="1"/>
      <text x="150" y="22" font-size="10.5" fill="#fbbf6b" text-anchor="middle">PORTAL LOGIN</text>
    </g>
    <g transform="translate(1118 508)">
      <rect x="0" y="-38" width="382" height="76" rx="11" fill="#101218" stroke="#20242e" stroke-width="1.2"/>
      <rect x="22" y="-16" width="42" height="32" rx="5" fill="none" stroke="#f97316" stroke-width="2"/><line x1="34" y1="22" x2="52" y2="22" stroke="#f97316" stroke-width="2"/><circle cx="43" cy="0" r="3" fill="#f97316"/>
      <text x="84" y="-4" font-size="14" fill="#e8ebf2" font-family="'Inter', sans-serif">Client</text>
      <rect x="84" y="8" width="174" height="20" rx="5" fill="#22c55e" fill-opacity="0.14" stroke="#22c55e" stroke-opacity="0.65" stroke-width="1"/>
      <text x="171" y="22" font-size="10.5" fill="#4ade80" text-anchor="middle">SENDING TRAFFIC</text>
    </g>
  </g>

  <!-- ============ attacker ============ -->
  <g transform="translate(660 120)">
    <rect x="-92" y="-34" width="184" height="68" rx="11" fill="#101218" stroke="#f43f5e" stroke-opacity="0.55" stroke-width="1.3"/>
    <g transform="translate(-58 0)" stroke="#fb7185" stroke-width="1.9"><circle r="15" fill="none"/><line x1="0" y1="-24" x2="0" y2="-9"/><line x1="0" y1="9" x2="0" y2="24"/><line x1="-24" y1="0" x2="-9" y2="0"/><line x1="9" y1="0" x2="24" y2="0"/><circle r="2.4" fill="#fb7185" stroke="none"/></g>
    <text x="-28" y="-4" font-size="14" font-weight="700" letter-spacing="1" fill="#fb7185" font-family="'JetBrains Mono', monospace">ATTACKER</text>
    <text x="-28" y="16" font-size="10" fill="#6b7384" font-family="'JetBrains Mono', monospace">handshakes + cleartext</text>
  </g>

  <!-- ============ enterprise auth backbone ============ -->
  <text x="110" y="700" font-size="12.5" font-weight="700" letter-spacing="2" fill="#6b7384" font-family="'JetBrains Mono', monospace">ENTERPRISE AUTH &#183; 802.1X / EAP</text>
  <g font-family="'JetBrains Mono', monospace" font-size="13.5" text-anchor="middle">
    <g transform="translate(110 742)"><rect width="160" height="50" rx="10" fill="#101218" stroke="#20242e" stroke-width="1.2"/><text x="80" y="30" fill="#93c5fd">FreeRADIUS</text></g>
    <g transform="translate(290 742)"><rect width="160" height="50" rx="10" fill="#101218" stroke="#20242e" stroke-width="1.2"/><text x="80" y="30" fill="#93c5fd">OpenLDAP</text></g>
    <g transform="translate(470 742)"><rect width="180" height="50" rx="10" fill="#101218" stroke="#20242e" stroke-width="1.2"/><text x="90" y="30" fill="#93c5fd">Cert Authority</text></g>
  </g>
</svg>
