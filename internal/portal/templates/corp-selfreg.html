<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stratford Group - Visitor Registration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; color: #1f2733;
    background: #eceff3; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.25rem;
  }
  .card { background: #fff; border-radius: 8px; max-width: 480px; width: 100%; overflow: hidden; box-shadow: 0 6px 30px rgba(0,0,0,0.1); }
  .top { background: #1b2a4a; color: #fff; padding: 1.4rem 1.75rem; display: flex; align-items: center; gap: 0.7rem; }
  .top svg { width: 26px; height: 26px; color: #4a9fd4; }
  .top .org { font-size: 1.1rem; font-weight: 700; }
  .top .org small { display: block; font-size: 0.68rem; font-weight: 400; opacity: 0.75; letter-spacing: 0.06em; }
  .body { padding: 1.6rem 1.75rem 1.9rem; }
  h2 { font-size: 1.05rem; color: #1b2a4a; margin-bottom: 0.3rem; }
  .lead { font-size: 0.82rem; color: #6b7280; margin-bottom: 1.4rem; line-height: 1.5; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0 0.8rem; }
  .field { margin-bottom: 0.9rem; }
  label { display: block; font-size: 0.72rem; font-weight: 600; color: #5a6172; margin-bottom: 0.3rem; }
  label .req { color: #c0392b; }
  input { width: 100%; padding: 0.7rem 0.85rem; border: 1px solid #d5dae0; border-radius: 5px; font-size: 0.9rem; }
  input:focus { outline: none; border-color: #2879d0; box-shadow: 0 0 0 3px rgba(40,121,208,0.12); }
  .terms { display: flex; align-items: flex-start; gap: 0.55rem; font-size: 0.78rem; color: #5a6172; margin: 0.4rem 0 1.2rem; line-height: 1.5; }
  .terms input { width: 16px; height: 16px; margin-top: 2px; accent-color: #1b2a4a; flex-shrink: 0; }
  .terms a { color: #2879d0; text-decoration: none; }
  .btn { width: 100%; padding: 0.85rem; background: #1b2a4a; color: #fff; border: none; border-radius: 5px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: #11203c; }
  .sponsor { font-size: 0.74rem; color: #9aa3b0; margin-top: 1rem; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V8l9-5 9 5v13"></path><path d="M9 21v-6h6v6M9 11h.01M15 11h.01"></path></svg>
    <div class="org">Stratford Group<small>VISITOR NETWORK ACCESS</small></div>
  </div>
  <div class="body">
    <h2>Visitor Registration</h2>
    <p class="lead">Register for guest Wi-Fi access. Your details are recorded for the duration of your visit and verified with your host.</p>

    <form method="POST" action="/portal/accept">
      <div class="grid2">
        <div class="field"><label for="fn">First Name <span class="req">*</span></label><input type="text" id="fn" name="first_name" required></div>
        <div class="field"><label for="ln">Last Name <span class="req">*</span></label><input type="text" id="ln" name="last_name" required></div>
      </div>
      <div class="field"><label for="em">Email Address <span class="req">*</span></label><input type="email" id="em" name="email" placeholder="you@company.com" required></div>
      <div class="grid2">
        <div class="field"><label for="co">Company</label><input type="text" id="co" name="company"></div>
        <div class="field"><label for="ph">Phone Number</label><input type="text" id="ph" name="phone"></div>
      </div>
      <div class="field"><label for="sp">Host / Sponsor Email <span class="req">*</span></label><input type="email" id="sp" name="sponsor_email" placeholder="employee@stratfordgroup.com" required></div>

      <label class="terms">
        <input type="checkbox" name="accepted_terms" value="yes" required>
        <span>I accept the <a href="/legal/aup">Acceptable Use Policy</a> and consent to my information being used to administer guest access.</span>
      </label>

      <button type="submit" class="btn">Register &amp; Connect</button>
    </form>

    <p class="sponsor">Access is subject to sponsor approval. You may receive an email when your registration is approved.</p>
  </div>
</div>
</body>
</html>
