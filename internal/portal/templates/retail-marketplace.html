<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Centre - Shopper Wi-Fi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #14121c; color: #1c1b24;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 1.25rem;
  }
  .card {
    background: #ffffff; border-radius: 16px; max-width: 460px; width: 100%;
    overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .hero {
    background: linear-gradient(120deg, #6d28d9 0%, #db2777 100%);
    color: #fff; padding: 2.1rem 1.9rem 1.8rem;
  }
  .hero .brand { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.1rem; }
  .hero .brand svg { width: 30px; height: 30px; }
  .hero .brand .wm { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.01em; }
  .hero h1 { font-size: 1.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 0.4rem; }
  .hero p { font-size: 0.86rem; opacity: 0.92; line-height: 1.5; }
  .body { padding: 1.7rem 1.9rem 2rem; }
  .perks { display: flex; gap: 0.8rem; margin-bottom: 1.5rem; }
  .perk { flex: 1; background: #faf6ff; border: 1px solid #ede2fb; border-radius: 10px; padding: 0.75rem 0.7rem; text-align: center; }
  .perk svg { width: 22px; height: 22px; color: #7c3aed; margin-bottom: 0.35rem; }
  .perk div { font-size: 0.7rem; font-weight: 600; color: #5b4b73; line-height: 1.3; }
  .field { margin-bottom: 0.95rem; }
  label { display: block; font-size: 0.74rem; font-weight: 600; color: #4a4458; margin-bottom: 0.32rem; }
  input[type=email], input[type=text] {
    width: 100%; padding: 0.78rem 0.9rem; border: 1.5px solid #ddd6e8;
    border-radius: 9px; font-size: 0.94rem; color: #1c1b24;
  }
  input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
  .optin { display: flex; align-items: flex-start; gap: 0.6rem; font-size: 0.78rem; color: #574d68; line-height: 1.5; margin: 0.3rem 0 1.3rem; }
  .optin input { width: 18px; height: 18px; margin-top: 1px; accent-color: #db2777; flex-shrink: 0; }
  .btn {
    width: 100%; padding: 0.95rem; border: none; border-radius: 50px;
    background: linear-gradient(120deg, #6d28d9 0%, #db2777 100%);
    color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
    transition: filter 0.15s;
  }
  .btn:hover { filter: brightness(1.08); }
  .legal { margin-top: 1.1rem; text-align: center; font-size: 0.72rem; color: #9b93a8; line-height: 1.5; }
  .legal a { color: #7c3aed; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="hero">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 2 3 6v14a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V6l-3-4z"></path>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <path d="M16 10a4 4 0 0 1-8 0"></path>
      </svg>
      <span class="wm">Marketplace Centre</span>
    </div>
    <h1>Welcome to free shopper Wi-Fi</h1>
    <p>Browse the store directory, find today's offers, and stay connected while you shop.</p>
  </div>
  <div class="body">
    <div class="perks">
      <div class="perk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
        <div>Store Directory</div>
      </div>
      <div class="perk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41 13.42 20.6a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
        <div>Member Offers</div>
      </div>
      <div class="perk">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
        <div>Easy Parking</div>
      </div>
    </div>

    <form method="POST" action="/portal/accept">
      <div class="field"><label for="em">Email Address</label><input type="email" id="em" name="email" placeholder="you@email.com" required></div>
      <div class="field"><label for="pc">Postal Code</label><input type="text" id="pc" name="postal_code" placeholder="90210" maxlength="10" required></div>

      <label class="optin">
        <input type="checkbox" name="marketing_optin" value="yes">
        <span>Send me exclusive Marketplace Centre offers, event news, and store promotions.</span>
      </label>

      <button type="submit" class="btn">Connect to Mall Wi-Fi</button>
    </form>

    <p class="legal">By connecting you accept the <a href="/legal/terms">Terms of Service</a> and <a href="/legal/privacy">Privacy Policy</a>.</p>
  </div>
</div>
</body>
</html>
