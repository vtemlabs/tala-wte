<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apex Arena - Free Fan Wi-Fi</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Arial Black', 'Segoe UI', Arial, sans-serif; color: #16121f;
    background: #0d0b14;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem 1rem;
  }
  .card { background: #fff; border-radius: 18px; max-width: 460px; width: 100%; overflow: hidden; box-shadow: 0 22px 64px rgba(0,0,0,0.55); }
  .hero { background: linear-gradient(125deg, #7b1fa2 0%, #e91e63 55%, #ff6d00 100%); color: #fff; padding: 1.6rem 1.6rem 1.7rem; position: relative; overflow: hidden; }
  .hero::after { content: ''; position: absolute; right: -40px; top: -40px; width: 160px; height: 160px; background: rgba(255,255,255,0.1); border-radius: 50%; }
  .brand { display: flex; align-items: center; gap: 0.7rem; position: relative; z-index: 1; }
  .brand .badge { width: 42px; height: 42px; border-radius: 11px; background: rgba(255,255,255,0.18); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .brand .badge svg { width: 26px; height: 26px; color: #fff; }
  .brand .t { font-weight: 900; font-size: 1.25rem; letter-spacing: 0.02em; line-height: 1; }
  .brand .t small { display: block; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.22em; opacity: 0.85; margin-top: 0.25rem; }
  .hero h1 { position: relative; z-index: 1; margin-top: 1.1rem; font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em; }
  .hero p { position: relative; z-index: 1; font-weight: 600; font-size: 0.85rem; opacity: 0.92; margin-top: 0.3rem; }
  .sponsor { background: #16121f; color: #ffd54f; text-align: center; font-size: 0.74rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.65rem 1rem; }
  .sponsor b { color: #fff; }
  .body { padding: 1.6rem 1.6rem 1.9rem; }
  .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 0.75rem; }
  label { display: block; font-size: 0.72rem; font-weight: 800; color: #6a5b80; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.06em; }
  input { width: 100%; padding: 0.85rem 0.95rem; border: 2px solid #e3dceb; border-radius: 10px; font-size: 0.95rem; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; }
  input:focus { outline: none; border-color: #e91e63; box-shadow: 0 0 0 3px rgba(233,30,99,0.16); }
  .field { margin-bottom: 1.1rem; }
  .terms { display: flex; align-items: flex-start; gap: 0.55rem; margin: 0.4rem 0; font-size: 0.8rem; color: #5a5168; line-height: 1.45; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 500; }
  .terms input { width: 18px; height: 18px; accent-color: #e91e63; margin-top: 0.1rem; flex-shrink: 0; }
  .terms a { color: #e91e63; text-decoration: none; font-weight: 700; }
  .btn { width: 100%; margin-top: 1.3rem; padding: 1rem; background: linear-gradient(125deg, #e91e63, #ff6d00); color: #fff; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; transition: filter 0.15s; }
  .btn:hover { filter: brightness(1.08); }
  .footer { font-size: 0.7rem; color: #a79bb6; text-align: center; margin-top: 1.3rem; line-height: 1.6; font-family: 'Segoe UI', Arial, sans-serif; }
  .footer a { color: #e91e63; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="hero">
    <div class="brand">
      <span class="badge"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16a1 1 0 0 1 1 1v4a2 2 0 0 0 0 4v4a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-4a2 2 0 0 0 0-4V5a1 1 0 0 1 1-1zm10 2v2h2V6h-2zm0 4v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg></span>
      <span class="t">APEX ARENA<small>EVENT WI-FI</small></span>
    </div>
    <h1>Connect &amp; Cheer</h1>
    <p>Free high-speed Wi-Fi for every fan in the building. Let's go!</p>
  </div>

  <div class="sponsor">Wi-Fi presented by <b>Voltage Energy Drink</b></div>

  <div class="body">
    <form method="POST" action="/portal/accept">
      <div class="grid">
        <div class="field">
          <label for="section">Seat section</label>
          <input type="text" id="section" name="section" placeholder="e.g. 114" required>
        </div>
        <div class="field">
          <label for="row">Row</label>
          <input type="text" id="row" name="row" placeholder="Opt.">
        </div>
      </div>

      <div class="field">
        <label for="email">Email for event offers</label>
        <input type="email" id="email" name="email" placeholder="you@example.com">
      </div>

      <label class="terms">
        <input type="checkbox" name="accepted_terms" value="yes" required>
        <span>I accept the <a href="/legal/terms">Terms</a> and <a href="/legal/aup">Acceptable Use Policy</a>.</span>
      </label>

      <button type="submit" class="btn">Connect &amp; Cheer</button>
    </form>

    <div class="footer">
      Network is shared by thousands of fans on game day. Speeds may vary by section.<br>
      <a href="/legal/privacy">Privacy Notice</a>
    </div>
  </div>
</div>
</body>
</html>
