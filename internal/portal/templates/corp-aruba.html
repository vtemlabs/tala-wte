<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vantage Industries - Guest Registration</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; color: #283447;
    background: #e9edf2; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 1.5rem;
  }
  .card {
    background: #ffffff; width: 100%; max-width: 460px; border-radius: 6px;
    overflow: hidden; box-shadow: 0 10px 30px rgba(20,40,70,0.14);
  }
  .head { background: #1d3a5f; color: #fff; padding: 1.6rem 1.9rem; }
  .head .brand { display: flex; align-items: center; gap: 0.65rem; }
  .head svg { width: 30px; height: 30px; color: #6fb3e0; }
  .head .org { font-size: 1.15rem; font-weight: 700; letter-spacing: 0.01em; }
  .head .tag { font-size: 0.78rem; color: #adc6df; margin-top: 0.5rem; }
  .body { padding: 1.7rem 1.9rem 2rem; }
  h1 { font-size: 1.05rem; font-weight: 700; color: #1d3a5f; margin-bottom: 0.4rem; }
  p.msg { font-size: 0.83rem; color: #5d6b7e; line-height: 1.55; margin-bottom: 1.4rem; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.9rem; margin-bottom: 0.9rem; }
  .field { margin-bottom: 0.9rem; }
  label { display: block; font-size: 0.74rem; font-weight: 600; color: #4a5a6e; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.03em; }
  input[type=text], input[type=email], input[type=tel] {
    width: 100%; padding: 0.72rem 0.85rem; border: 1px solid #cdd6e0; border-radius: 4px;
    font-size: 0.9rem; color: #283447;
  }
  input:focus { outline: none; border-color: #2f7bc4; box-shadow: 0 0 0 3px rgba(47,123,196,0.12); }
  .terms { display: flex; align-items: flex-start; gap: 0.55rem; font-size: 0.8rem; color: #5d6b7e; line-height: 1.5; margin: 0.4rem 0 1.3rem; }
  .terms input { margin-top: 2px; width: 16px; height: 16px; accent-color: #2f7bc4; flex-shrink: 0; }
  .terms a { color: #2f7bc4; text-decoration: none; }
  .btn {
    width: 100%; padding: 0.85rem; background: #2f7bc4; color: #fff; border: none;
    border-radius: 4px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: background 0.15s;
  }
  .btn:hover { background: #2667a8; }
  .sponsor-note { font-size: 0.76rem; color: #8595a8; margin-top: 1.1rem; text-align: center; line-height: 1.5; }
  @media (max-width: 420px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <div class="brand">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V8l9-5 9 5v13"></path><path d="M9 21v-6h6v6"></path><path d="M3 21h18"></path></svg>
      <span class="org">Vantage Industries</span>
    </div>
    <div class="tag">Corporate Guest Wireless</div>
  </div>

  <div class="body">
    <h1>Register for guest access</h1>
    <p class="msg">Complete the form below to request temporary network access. A guest account will be created and your sponsor notified for approval.</p>

    <form method="POST" action="/portal/accept">
      <div class="grid">
        <div class="field">
          <label for="first_name">First name</label>
          <input type="text" id="first_name" name="first_name" autocomplete="given-name" required>
        </div>
        <div class="field">
          <label for="last_name">Last name</label>
          <input type="text" id="last_name" name="last_name" autocomplete="family-name" required>
        </div>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="you@company.com" required>
      </div>

      <div class="field">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" autocomplete="organization" required>
      </div>

      <div class="field">
        <label for="phone">Mobile phone</label>
        <input type="tel" id="phone" name="phone" autocomplete="tel" placeholder="(555) 123-4567">
      </div>

      <div class="field">
        <label for="sponsor_email">Sponsor email</label>
        <input type="email" id="sponsor_email" name="sponsor_email" placeholder="sponsor@vantage-ind.com" required>
      </div>

      <label class="terms">
        <input type="checkbox" name="accepted_terms" value="yes" required>
        <span>I accept the <a href="/legal/terms">Terms of Use</a> and <a href="/legal/aup">Acceptable Use Policy</a>. Network activity may be monitored.</span>
      </label>

      <button type="submit" class="btn">Register for Guest Access</button>
    </form>

    <p class="sponsor-note">Your sponsor will receive a notification to approve this request.</p>
  </div>
</div>
</body>
</html>
